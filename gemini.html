<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Analog Clock</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #d8dee8; /* Soft wall color */
            font-family: sans-serif;
        }

        /* The main clock body */
        .clock {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: #fdfdfd;
            /* Metallic bezel effect */
            border: 12px solid #2c2c2c;
            box-shadow: 
                0 15px 25px rgba(0, 0, 0, 0.2), /* Drop shadow on the wall */
                inset 0 0 15px rgba(0, 0, 0, 0.1), /* Inner shadow for depth */
                0 0 0 4px #555, /* Outer bezel ridge */
                inset 0 0 0 4px #111; /* Inner bezel ridge */
            position: relative;
        }

        /* The dial */
        .clock-face {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        /* Glass glare effect overlaid on top */
        .glass {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 45%);
            pointer-events: none; /* Allows clicks to pass through if needed */
            z-index: 20;
        }

        /* Ticks generated by JavaScript */
        .tick {
            position: absolute;
            top: 4px;
            left: 50%;
            width: 2px;
            height: 10px;
            background: #888;
            /* The origin is the exact center of the 296x296 inner clock face */
            transform-origin: 50% 144px; 
            margin-left: -1px;
        }

        .tick.thick {
            width: 4px;
            height: 16px;
            background: #222;
            margin-left: -2px;
        }

        /* Clock Hands */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: 50% 100%; /* Pivot point at the bottom of the hand */
            border-radius: 10px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3); /* Realistic shadow floating over dial */
            z-index: 10;
        }

        .hour-hand {
            width: 8px;
            height: 85px;
            background: #222;
            margin-left: -4px;
        }

        .minute-hand {
            width: 6px;
            height: 115px;
            background: #333;
            margin-left: -3px;
        }

        .second-hand {
            width: 2px;
            height: 130px;
            background: #cc0000;
            margin-left: -1px;
            z-index: 11;
        }

        /* The tail of the second hand that extends past the center */
        .second-hand::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 25px;
            background: #cc0000;
            border-radius: 2px;
        }

        /* The center pin holding the hands */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            background: #cc0000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 12;
            box-shadow: 
                inset 0 0 4px rgba(0,0,0,0.6), 
                2px 2px 4px rgba(0,0,0,0.3);
            border: 2px solid #fff;
        }
    </style>
</head>
<body>

    <div class="clock">
        <div class="glass"></div>
        <div class="clock-face" id="clock-face">
            <div class="hand hour-hand" id="hour"></div>
            <div class="hand minute-hand" id="minute"></div>
            <div class="hand second-hand" id="second"></div>
            <div class="center-dot"></div>
        </div>
    </div>

    <script>
        const face = document.getElementById('clock-face');
        const hourHand = document.getElementById('hour');
        const minuteHand = document.getElementById('minute');
        const secondHand = document.getElementById('second');

        // 1. Generate the 60 ticks around the dial
        for (let i = 0; i < 60; i++) {
            const tick = document.createElement('div');
            tick.classList.add('tick');
            // Every 5th tick is an hour mark (thicker)
            if (i % 5 === 0) {
                tick.classList.add('thick');
            }
            // Rotate each tick by 6 degrees (360 degrees / 60 minutes)
            tick.style.transform = `rotate(${i * 6}deg)`;
            
            // Insert ticks before the hands so they sit underneath them in the DOM
            face.insertBefore(tick, hourHand);
        }

        // 2. Update the time
        function updateClock() {
            const now = new Date();

            // Calculate degrees for the second hand
            const seconds = now.getSeconds();
            const secondsDegrees = (seconds / 60) * 360;
            secondHand.style.transform = `rotate(${secondsDegrees}deg)`;

            // Calculate degrees for the minute hand (factors in seconds for smooth movement)
            const minutes = now.getMinutes();
            const minutesDegrees = ((minutes / 60) * 360) + ((seconds / 60) * 6);
            minuteHand.style.transform = `rotate(${minutesDegrees}deg)`;

            // Calculate degrees for the hour hand (factors in minutes for smooth movement)
            const hours = now.getHours();
            const hoursDegrees = ((hours / 12) * 360) + ((minutes / 60) * 30);
            hourHand.style.transform = `rotate(${hoursDegrees}deg)`;
        }

        // Run the update every 1000ms (1 second)
        setInterval(updateClock, 1000);
        
        // Initialize clock immediately so it doesn't start at 12:00 for the first second
        updateClock();
    </script>
</body>
</html>
