<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Clock</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#1a1a1a;
    font-family:Arial, Helvetica, sans-serif;
}

.clock{
    width:320px;
    height:320px;
    border:12px solid #222;
    border-radius:50%;
    background:radial-gradient(circle, #ffffff 70%, #e6e6e6);
    position:relative;
    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.3),
        0 10px 25px rgba(0,0,0,0.6);
}

/* center pin */
.center{
    width:14px;
    height:14px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
}

/* numbers */
.number{
    position:absolute;
    width:100%;
    height:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.number1 { transform: rotate(30deg); }
.number2 { transform: rotate(60deg); }
.number3 { transform: rotate(90deg); }
.number4 { transform: rotate(120deg); }
.number5 { transform: rotate(150deg); }
.number6 { transform: rotate(180deg); }
.number7 { transform: rotate(210deg); }
.number8 { transform: rotate(240deg); }
.number9 { transform: rotate(270deg); }
.number10 { transform: rotate(300deg); }
.number11 { transform: rotate(330deg); }

.number div{
    transform: rotate(-var(--rotation));
    margin-top:10px;
}

/* hands */
.hand{
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin:bottom;
    transform:translateX(-50%) rotate(0deg);
    border-radius:6px;
}

.hour{
    width:8px;
    height:80px;
    background:#000;
}

.minute{
    width:6px;
    height:110px;
    background:#222;
}

.second{
    width:2px;
    height:120px;
    background:red;
}

</style>
</head>
<body>

<div class="clock">

    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>

    <div class="center"></div>

    <div class="number number1"><div>1</div></div>
    <div class="number number2"><div>2</div></div>
    <div class="number number3"><div>3</div></div>
    <div class="number number4"><div>4</div></div>
    <div class="number number5"><div>5</div></div>
    <div class="number number6"><div>6</div></div>
    <div class="number number7"><div>7</div></div>
    <div class="number number8"><div>8</div></div>
    <div class="number number9"><div>9</div></div>
    <div class="number number10"><div>10</div></div>
    <div class="number number11"><div>11</div></div>
    <div class="number number12"><div>12</div></div>

</div>

<script>
function setClock(){
    const now = new Date();

    const seconds = now.getSeconds();
    const minutes = now.getMinutes();
    const hours = now.getHours();

    const secondDeg = seconds * 6;
    const minuteDeg = minutes * 6 + seconds * 0.1;
    const hourDeg = hours * 30 + minutes * 0.5;

    document.getElementById("second").style.transform =
        `translateX(-50%) rotate(${secondDeg}deg)`;

    document.getElementById("minute").style.transform =
        `translateX(-50%) rotate(${minuteDeg}deg)`;

    document.getElementById("hour").style.transform =
        `translateX(-50%) rotate(${hourDeg}deg)`;
}

setClock();
setInterval(setClock, 1000);
</script>

</body>
</html>
